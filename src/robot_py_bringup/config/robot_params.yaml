motor_controller:
  ros__parameters:
    base_speed: 100.0
    pwm_frequency: 1000.0 # Hz

ultrasonic_sensor:
  ros__parameters:
    publish_rate: 20.0 # Hz
    emergency_stop_distance: 15.0 # cm

line_tracker:
  ros__parameters:
    enabled: False
    steering_sensitivity: 1.0

keyboard_controller:
  ros__parameters:
    key_control_active: True
    acceleration_sensitivity: 1.0
    steering_sensitivity: 1.0
    update_frequency: 20.0 # Hz
